<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Array</h1>
  <script>
// 1. Create a numerically indexed table (ie. an array): pets, like this ['cat','dog','fish','rabbit','cow']
    let animals = ['cat','dog','fish','rabbit','cow']
// 2. Display dog
    console.log(animals[1])
// 3. Add to the array pets, the pet horse. Remove the pet rabbit
    animals.splice(animals.indexOf('rabbit'), 1, 'horse')
    console.log(animals)
// 4. Display the array length
    console.log(animals.length)
  </script>
</body>
</html>
