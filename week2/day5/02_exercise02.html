<body>
  <h1>Exercise 2</h1>

  <script>
// 1. Store your birth year in a variable.
    const myBirthYear = 1883
// 2. Store a future year in a variable.
    const futureYear = 2000
// 3. Calculate your age for that year based on the stored values.
    const myAgeInFuture = futureYear - myBirthYear
// 4. Display : "I will be NN in YYYY", substituting the values.
    console.log("I will be " + myAgeInFuture + " in " + futureYear)
// template string
    console.log(`I will be ${myAgeInFuture} in the year ${futureYear}.`)

  </script>
