<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
  <script>
    let person = {
      firstName: "John",
      lastName: "Doe",
      age: 50,
      eyeColor: "blue"
    };

    const userInput = prompt('Choose: firstName, lastName, age, eyeColor')

    alert(`The user chose ${userInput}, which has a value of ${person[userInput]} in our object.`)
  </script>
