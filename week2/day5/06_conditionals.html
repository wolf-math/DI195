<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Conditionals</h1>
  <h2>I mean if-statements</h2>

  <script>
    const userNumber = prompt('Enter a number')

    if (userNumber < 10 ){
      alert("user picked a small number")
    } else if (userNumber >= 10 && userNumber <= 100){
      alert("user picked a medium sized number")
    } else {
      alert("user picked a large number")
    }


    

  </script>
</body>
</html>
