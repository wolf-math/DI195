<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body> 
    <p id ='text'>DOM Attributes! Yeahhh !!</p>

    <script>
      // Modify the style of the paragraph text (such as fontSize, fontFamily, color, etc. )through javascript code.

      const par = document.getElementById('text')

      par.style.fontSize = '10rem'
      par.style.fontFamily = 'Arial'
      par.style.color = 'goldenrod'

    </script>
</body> 
</html>
